name: Renovate

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: renovatebot/github-action@v46.1.7
        with:
          token: ${{ secrets.CC_PAT }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}

