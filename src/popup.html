<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .logo-full { height: 24px; width: auto; }
    .version { margin-left: auto; font-size: 10px; color: #4b4b6b; }
    .subtitle { color: #8b8bab; font-size: 11px; margin-bottom: 14px; }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-top: 1px solid #2d2d4a;
    }

    .toggle-label { font-size: 12px; }
    .toggle-desc { font-size: 10px; color: #6b7280; margin-top: 1px; }

    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #374151; border-radius: 20px; transition: 0.2s;
    }
    .slider::before {
      content: ""; position: absolute;
      height: 14px; width: 14px; left: 3px; bottom: 3px;
      background: white; border-radius: 50%; transition: 0.2s;
    }
    input:checked + .slider { background: #6366f1; }
    input:checked + .slider::before { transform: translateX(16px); }

    .section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: #6b7280; margin-top: 10px; margin-bottom: 2px;
    }

    /* Segmented control — 4 media modes */
    .seg-desc {
      font-size: 10px;
      color: #6b7280;
      margin-bottom: 6px;
      border-top: 1px solid #2d2d4a;
      padding-top: 6px;
    }

    .seg-ctrl {
      display: flex;
      background: #0f0f1f;
      border-radius: 8px;
      padding: 2px;
      gap: 2px;
      margin-bottom: 8px;
      border: 1px solid #2d2d4a;
    }

    .seg-btn {
      flex: 1;
      padding: 6px 2px;
      border: none;
      background: none;
      color: #6b7280;
      font-size: 10px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
      line-height: 1.2;
    }

    .seg-btn:hover { color: #a5b4fc; }
    .seg-btn.active { background: #6366f1; color: #fff; }

    .social-row {
      display: flex; justify-content: center; gap: 16px;
      margin-top: 8px; padding-top: 8px; border-top: 1px solid #2d2d4a;
    }
    .social-link {
      color: #8b8bab; text-decoration: none; font-size: 11px; transition: color 0.15s;
    }
    .social-link:hover { color: #6366f1; }

  </style>
</head>
<body>
  <div class="header">
    <img class="logo-full" src="/assets/logo.svg" alt="Vaultopolis" id="logo">
    <span class="version" id="version"></span>
  </div>
  <div class="subtitle">Market analytics for Top Shot, All Day, and Pinnacle</div>

  <div class="section-label">Analytics</div>

  <div class="toggle-row">
    <div><div class="toggle-label">Show price badges</div><div class="toggle-desc">Floor price pill on each card — click to expand</div></div>
    <label class="toggle"><input type="checkbox" id="enabled" checked><span class="slider"></span></label>
  </div>

  <div class="section-label">Media Performance</div>

  <div class="seg-desc">Controls how card videos and images load</div>
  <div class="seg-ctrl">
    <button class="seg-btn" data-mode="normal">Normal</button>
    <button class="seg-btn" data-mode="pause">Pause<br>Videos</button>
    <button class="seg-btn" data-mode="block">Hide<br>Videos</button>
    <button class="seg-btn" data-mode="blockAll">Hide<br>All</button>
  </div>

  <div class="social-row">
    <a class="social-link" href="https://x.com/vaultopolis" target="_blank" rel="noopener">Twitter/X</a>
    <a class="social-link" href="https://discord.gg/nJdwqYfenh" target="_blank" rel="noopener">Discord</a>
    <a class="social-link" href="https://github.com/LibruaryNFT/vaultopolis-extension" target="_blank" rel="noopener">GitHub</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
